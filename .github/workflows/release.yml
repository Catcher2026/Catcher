name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # postinstall runs `playwright install chromium` with PLAYWRIGHT_BROWSERS_PATH=0
      # so the browser ends up in node_modules/playwright-core/.local-browsers,
      # which electron-builder copies via extraResources.
      - name: Install dependencies
        run: npm ci

      - name: Build & publish (Windows)
        if: matrix.os == 'windows-latest'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run build:renderer && npx electron-builder --win --publish always

      - name: Build & publish (macOS)
        if: matrix.os == 'macos-latest'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Tell electron-builder not to attempt code-signing — we don't have certs.
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
        run: npm run build:renderer && npx electron-builder --mac --publish always
