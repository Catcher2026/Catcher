name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # Skip the postinstall playwright-browser download — unit tests are pure
      # functions and don't drive a browser. Saves ~2 minutes per CI run.
      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Type-check
        run: npx tsc --noEmit -p tsconfig.json

      - name: Unit tests
        run: npm test

      - name: Build renderer + electron main
        run: npm run build:renderer
